<script>

function merge(obj1, obj2){

    let result = {};

    for(let key in obj1){
        result[key] = obj1[key];
    }

    for(let key in obj2){
        result[key] = obj2[key];
    }

    return result;
}

let obj1 = {a:1, b:2};
let obj2 = {b:5, c:3};

console.log(merge(obj1, obj2));

</script>
