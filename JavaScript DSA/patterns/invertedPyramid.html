<script>
function inverted(n){

    for(let i = n; i >= 1; i--){

        let row = "";

        for(let j = 1; j <= n-i; j++){
            row += "&nbsp;";
        }

        for(let k = 1; k <= i; k++){
            row += "* ";
        }

        document.write(row + "<br>");
    }
}

inverted(4);
</script>
