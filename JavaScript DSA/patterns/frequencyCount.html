<script>
    function countfreq(str){
        freq = {};

        for(let i = 0; i < str.length; i++){
            if(str[i] === " "){
                continue;
            }
           else if(freq[str[i]]){
                freq[str[i]]++;
            }else{
                freq[str[i]] = 1;
            }
        }
        return freq;
    }
    console.log(countfreq("javaScript is my fav"));
</script>
