<script>

    function checkAnagram(str1, str2) {

        let count = 0;

        for (let i = 0; i < str1.length; i++) {

            for (let j = 0; j < str2.length; j++) {

                if (str1[i] === str2[j]) {
                    count++;
                    break;
                }
            }
        }

        if (count === str1.length) {
            return "Anagram";
        } else {
            return "Not Anagram";
        }
    }

    console.log(checkAnagram("listen", "silent"));

</script>
