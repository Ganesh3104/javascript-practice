<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
</head>
<body>

  <h2>Weather App</h2>

  <input type="text" id="cityInput" placeholder="Enter city">
  <button onclick="showWeather()">Search</button>

  <div id="result"></div>

  <script>

  let whether = [
    {city: "Nanded", temp: "32 c", condition: "Sunney"},
    {city: "Hyderabad", temp: "37 c", condition: "Sunney"},
    {city: "Pune", temp: "30 c", condition: "Rainey"}
  ];

  function showWeather(){
    let city = document.getElementById("cityInput").value;
    let result = document.getElementById("result");

    for(let i = 0; i < whether.length; i++){
        if(whether[i].city.toLowerCase() === city.toLowerCase()){
           result.innerHTML = 
           "<h3>" + whether[i].city + "</h3>" +
           "<p>Temp: " + whether[i].temp + "</p>" +
            "<p>Condition: " + whether[i].condition + "</p>"

            return;
        }
    }
    result.innerHTML = "City not found";
  }
  </script>

</body>
</html>
