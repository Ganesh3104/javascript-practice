<script>
  function capitalfirstlet(str){
   let res = "";

   for(let i = 0; i < str.length; i++){
      if(i === 0 || str[i - 1] === " "){
         res += str[i].toUpperCase();
      }else{
         res += str[i];
      }
   }
   return res;
  }
  console.log(capitalfirstlet("make first letter of every word capital"));
</script>
