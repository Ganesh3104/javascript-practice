<script>
  function Prime(num){
    if(num <= 1){
      return "not Prime";
    }

    for(let i = 2; i < num; i++){
      if(num % i === 0){
        return "not prime";
      }
    }
    return "prime num";
  }
  console.log(Prime(7));
</script>
