<script>
    function miss(str){
        result = [];

        for(let i = 0; i < str.length; i++){
            let prev = str.charCodeAt(i - 1);
            let curr = str.charCodeAt(i);

            for(let j = prev + 1; j < curr; j++){
                result += String.fromCharCode(j);
            }
        }
        return result;
    }
    console.log(miss("bdfh"))
</script>
