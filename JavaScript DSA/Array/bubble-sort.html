<script>
    function sort(arr){
        let n = arr.length;
        for(let i = 0; i < n - 1; i++){
            for(let j = 0; j < n - 1 - i; j++){
                if(arr[j] > arr[j + 1]) {
                    let temp = arr[j];
                    arr[j] = arr[j + 1];
                    arr[j + 1] = temp;
                }
            }
        }
        return arr;
    }
    let arr = [20, 10, 5, 40];
    console.log(sort(arr));
</script>
