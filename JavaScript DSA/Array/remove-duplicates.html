<script>
    function removeDuplicates(arr) {
    let result = [];
    for (let i = 0; i < arr.length; i++) {
        if (!result.includes(arr[i])) {
            result.push(arr[i]);
        }
    }
    return result;
}

let arr = [10, 20, 20, 30, 40, 30, 10];
console.log(removeDuplicates(arr)); 

</script>
