<script>
    function element(arr1, arr2, arr3){
    let result = [];

    for(let i = 0; i < arr1.length; i++){
        for(let j = 0; j < arr2.length; j++){
            for(let k = 0; k < arr3.length; k++){

                if(arr1[i] === arr2[j] && arr2[j] === arr3[k]){

                    let exists = false;

                    for(let m = 0; m < result.length; m++){
                        if(result[m] === arr1[i]){
                            exists = true;
                        }
                    }

                    if(exists === false){
                        result[result.length] = arr1[i];
                    }
                }
            }
        }
    }

    return result;
}

console.log(element([1,2,3,4], [1,2,5,6], [1,2,8,9]));
</script>
