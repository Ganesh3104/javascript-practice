<script>
    function separate(arr){
    let even = [];
    let odd = [];
    
    for(let i = 0; i < arr.length; i++){
        if(arr[i] % 2 === 0){
            even[even.length] = arr[i];
        } else{
            odd[odd.length] = arr[i];
        }
    }
    
    console.log("Even", even);
    console.log("Odd", odd);
}
let num = [10, 15, 16, 17, 20]
separate(num);
</script>
