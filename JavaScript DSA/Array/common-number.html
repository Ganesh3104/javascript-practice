<script>
 function common(arr){
  let result = [];

  for(let i = 0; i < arr.length; i++){
    let exists = false;

    for(let k = 0; k < result.length; k++){
      if(result[k] === arr[i]){
        exists = true;
        break;
      }
    }
    if(!exists){
      for(let j = i + 1; j < arr.length; j++){
        if(arr[i] === arr[j]){
          result[result.length] = arr[i];
          break;
        }
      }
    }
  }
  return result;
 }
 console.log(common([1,1,1,2,2,2,3,3,3,4,4,5]))
</script>
