<script>
    function first(arr){
        for(let i = 0; i < arr.length; i++){
             for(let j = i + 1; j < arr.length; j++){
                if(arr[i] === arr[j]){
                    return arr[i];
                }
             }
        }
    }
    console.log(first([2,1,3,2,1]))
</script>
