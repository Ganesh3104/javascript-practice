<script>
    function rotate(str){
        let result = [];
        let k = 4;

        for(let i = 0; i < str.length; i++){
            result[(i + k) % str.length] = str[i];
        }

        console.log(result.join(""));
    }

    rotate("Inst__ae");
</script>
