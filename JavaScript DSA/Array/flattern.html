<script>

function flatten(arr){

    let result = [];

    for(let i = 0; i < arr.length; i++){

        if(Array.isArray(arr[i])){

            let temp = flatten(arr[i]);

            for(let j = 0; j < temp.length; j++){
                result[result.length] = temp[j];
            }

        }else{

            result[result.length] = arr[i];
        }
    }

    return result;
}

console.log(flatten([1,[2,3],[4,[5]]]));

</script>
