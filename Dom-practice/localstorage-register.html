<h2>Register</h2>
<input type="text" id="rname" placeholder="Name"><br><br>
<input type="email" id="remail" placeholder="Email"><br><br>
<input type="password" id="rpass" placeholder="Password"><br><br>
<button onclick="register()">Register</button>
<p id="rmsg"></p>

<script>
function register(){
    let name = document.getElementById("rname").value;
    let email = document.getElementById("remail").value;
    let pass = document.getElementById("rpass").value;
    let msg = document.getElementById("rmsg");

    if(name=="" || email=="" || pass==""){
        msg.innerHTML = "All fields required";
        msg.style.color="red";
    }
    else{
        // store in localStorage
        localStorage.setItem("email", email);
        localStorage.setItem("password", pass);

        msg.innerHTML = "Registration Successful";
        msg.style.color="green";
    }
}
</script>
