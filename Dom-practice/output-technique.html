<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function show(){
            alert("welcome");

            document.getElementById("text").innerHTML = "Heading in page";

            console.log("welcome javaScript console");

            document.getElementById("box").value = "input in page";

            document.getElementById("p").innerHTML = "<h1>hello</h1>"  // innerHTML read HTML + text and text content read only text.

            // document.write("document.write in page");

            // document.write() should not be used after page load because it overwrites the page.
           
        }
    </script>
</head>
<body>
    <h3 id="text"></h3>
    <input type="text" id="box"><br><br>
    <p id="p"></p>
    <button onclick="show()">show output</button>
</body>
</html>
