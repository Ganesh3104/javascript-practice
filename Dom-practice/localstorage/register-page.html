<h2>Register</h2>
<input type="text" id="rname" placeholder="Name"><br><br>
<input type="email" id="remail" placeholder="Email"><br><br>
<input type="password" id="rpass" placeholder="Password"><br><br>
<button onclick="register()">Register</button>
<p id="rmsg"></p>

<script>
function register(){
    let name = rname.value;   // same as let name = document.getElementById("rname").value;
    let email = remail.value;
    let pass = rpass.value;
    let msg = document.getElementById("rmsg");

    if(name=="" || email=="" || pass==""){
        msg.innerHTML="All fields required";
        msg.style.color="red";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // check if email already exists
    let found = users.find(u => u.email === email);
    if(found){
        msg.innerHTML="Email already registered";
        msg.style.color="red";
        return;
    }

    users.push({name,email,pass});
    localStorage.setItem("users", JSON.stringify(users));

    msg.innerHTML="Registration Successful";
    msg.style.color="green";
}
</script>
