
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
</head>
<script>
    var volume = 0;
      function Increase(){
        volume++;
        document.getElementById("volume").innerHTML = volume;
      }

      function Decrease(){
        volume--;
        document.getElementById("volume").innerHTML = volume;
      }
</script>
<body>
    <button class="bi bi-volume-up" onclick="Increase()"></button>
    <span id="volume"></span>
    <button class="bi bi-volume-down" onclick="Decrease()"></button>
</body>
</html>
