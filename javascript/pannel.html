
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f8f9fa}
    .card{width:100%; max-width:420px; border-radius:12px}
    .form-control:focus{box-shadow:none}
  </style>
</head>
<body>
  <div class="container">
    <div class="d-flex justify-content-center align-items-center vh-100">
      <div class="card shadow-sm p-4">
        <div class="card-body">
          <h4 class="card-title mb-1">Welcome back</h4>
          <p class="text-muted small mb-3">Sign in to your account</p>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
              <div class="invalid-feedback" id="emailError">Please provide a valid email.</div>
            </div>

            <div class="mb-3 position-relative">
              <label for="password" class="form-label">Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="password" placeholder="Enter password" required minlength="6">
                <button class="btn btn-outline-secondary" type="button" id="togglePwd">Show</button>
              </div>
              <div class="invalid-feedback" id="pwdError">Password must be at least 6 characters.</div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label small" for="remember">Remember me</label>
              </div>
              <a href="#" class="small">Forgot?</a>
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-primary" type="submit">Sign in</button>
              <button class="btn btn-outline-primary" type="button" id="demoBtn">Demo login</button>
            </div>

          </form>

          <div class="text-center mt-3 small text-muted">Don't have an account? <a href="#">Create one</a></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index:11">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-body" id="toastBody">...</div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const form = document.getElementById('loginForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const pwdError = document.getElementById('pwdError');
    const togglePwd = document.getElementById('togglePwd');
    const demoBtn = document.getElementById('demoBtn');
    const toastEl = document.getElementById('liveToast');
    const toastBody = document.getElementById('toastBody');
    const bsToast = new bootstrap.Toast(toastEl, { delay: 2500 });

    function showToast(text){ toastBody.textContent = text; bsToast.show(); }

    togglePwd.addEventListener('click', ()=>{
      if(password.type === 'password'){ password.type = 'text'; togglePwd.textContent = 'Hide'; }
      else { password.type = 'password'; togglePwd.textContent = 'Show'; }
    });

    demoBtn.addEventListener('click', ()=>{
      email.value = 'student@example.com'; password.value = 'password123';
      showToast('Demo credentials filled');
    });

    function validate(){
      let ok = true;
      // email
      if(!email.value || !/^\S+@\S+\.\S+$/.test(email.value)){
        email.classList.add('is-invalid'); ok = false;
      } else { email.classList.remove('is-invalid'); }

      // password
      if(!password.value || password.value.length < 6){
        password.classList.add('is-invalid'); ok = false;
      } else { password.classList.remove('is-invalid'); }

      return ok;
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      if(!validate()) return;

      showToast('Signing in...');
      try{
        const res = await fakeLogin(email.value, password.value);
        if(res.success){ showToast('Login successful'); setTimeout(()=> window.location.href = '/dashboard', 700); }
        else showToast('Login failed: ' + res.message);
      } catch(err){ showToast('Error: ' + err.message); }
    });

    // Replace fakeLogin with real server call using fetch()
    async function fakeLogin(e, p){
      return new Promise(resolve => setTimeout(()=>{
        if(e === 'student@example.com' && p === 'password123') resolve({success:true});
        else resolve({success:false, message:'Invalid credentials'});
      }, 700));
    }
  </script>
</body>
</html>
