

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function deleteClick(){
            result = confirm("Record delete \n are you sure? want to delete");
            if(result === true){
            document.querySelector("p").outerHTML = "<h2> Record deleted Successfully! </h2>";
            }else{
                document.querySelector("p").innerHTML = "<h2> Delete Canceled </h2>";
            }
        }
    </script>
</head>
<body>
    <button onClick="deleteClick()">delete</button>
    <p></p>
</body>
</html>
