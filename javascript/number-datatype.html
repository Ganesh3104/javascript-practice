<script>
       var  x = 4500.341;
       document.writeln(x.toFixed() + "<br>"); 
      document.writeln(x.toFixed(2) + "<br>");           // 4500.34
      document.writeln(x.toPrecision(5) + "<br>");        // 4500.4
      document.writeln(x.toFixed(0) + "<br>");            // 4500
</script>
