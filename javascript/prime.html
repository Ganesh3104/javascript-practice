<script>

    const p = parseInt(prompt("Enter number"));
    let isPrime = true;

    if(p === 1){
        console.log("1 is not prime and composite");
    }

    else if(p > 1){
        for(let i = 2; i <= p/2; i++){
            if(p % i == 0){
                isPrime = false;
                break;
            }
        }
        if(isPrime){
            console.log(`${p} is prime num`);
        }else{
            console.log(`${p} is not prime num`);
        }
    }
    else{
        console.log("the number is not prime num");
    }
</script>
