<script>
    function secondLarge(arr){
        let first = -Infinity, second = -Infinity;
        for(let n of arr){
            if(n > first) [first, second] = [n, first];
            else if(n > second && n < first) second = n;
        }
        return second;
    }
    console.log(secondLarge([14,47,51]))
</script>
