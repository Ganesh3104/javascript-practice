<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

        function bodyload(){
            fetch("https://fakestoreapi.com/products/categories")
            .then(function(response){
                return response.json();
            })
            .then(function(categories){
                categories.map(function(category){
                    let div = document.createElement("div");
                    div.innerHTML = `<div>${category}</div>`;
                    document.getElementById("listcat").appendChild(div);
                })
            })
        }


        function showcard(){
            fetch("https://fakestoreapi.com/products")
        .then(function(response){
            return response.json();
        })

        .then(function(products){
            products.map(function(product){
                let div = document.createElement("div");
                div.style.cssText = "height: 300px; width: 200px; border: 1px solid black; border-radius: 10px; display: inline-block; padding: 10px; margin:10px";
                div.innerHTML = `
                <div> <img src=${product.image} width="100px">  </div>
                <div style="padding-top:10px;">${product.title}</div>
                <div style="padding-top:10px; font-weight:bold">$ ${product.price}</div>
                `;
                document.getElementById("card").appendChild(div)
            })
        })
        }
    </script>
</head>
<body onload="bodyload()">
    <div id="listcat" style="padding: 10px; font-weight: bold; font-size: 20px; font-family: Arial, Helvetica, sans-serif;"></div>
    <button onclick="showcard()">Watch cards</button>
    <div id="card">
       
    </div>
</body>
</html>
